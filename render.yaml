services:
  # Python FastAPI Backend Web Service
  - type: web
    name: antigravity-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: antigravity-postgres
          property: connectionString
      - key: LOW_STOCK_THRESHOLD
        value: "10"

databases:
  # PostgreSQL Database Instance
  - name: antigravity-postgres
    plan: free
    postgresVersion: "15"
