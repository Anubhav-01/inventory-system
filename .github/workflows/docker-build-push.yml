name: Build & Push Docker Images

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/inventory-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/inventory-backend:${{ github.sha }}

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/inventory-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/inventory-frontend:${{ github.sha }}

      - name: Print image URLs
        run: |
          echo "✅ Backend image: https://hub.docker.com/r/${{ secrets.DOCKER_USERNAME }}/inventory-backend"
          echo "✅ Frontend image: https://hub.docker.com/r/${{ secrets.DOCKER_USERNAME }}/inventory-frontend"
